<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Items - Wear Stock</title>
    <link rel="stylesheet" href="item.css">
</head>
<body>

<header class="navbar">
    <div class="logo">
        <span class="logo-wear">Wear</span>
        <span class="logo-stock">Stock</span>
    </div>
    <nav class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="item.html">Items</a>
        <a href="reports.html">Reports</a>
        <a href="#" onclick="logout()">Logout</a>
    </nav>
</header>

<h2 align="center">Manage Items</h2>

<div align="center">
    <input type="text" id="name" placeholder="Item Name">
    <input type="text" id="category" placeholder="Category">
    <input type="text" id="size" placeholder="Size">
    <input type="number" id="qty" placeholder="Quantity">
    <button id="addBtn">Add Item</button>
</div>

<br>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Size</th>
                <th>Qty</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<footer>
    <aside>&copy; 2026 Wear Stock</aside>
</footer>

<script src="item.js"></script>
</body>
</html>
