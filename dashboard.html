<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wear Stock Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<header class="navbar">
    <div class="logo">
        <span class="logo-wear">Wear</span>
        <span class="logo-stock">Stock</span>
    </div>
    <nav class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="item.html">Items</a>
        <a href="reports.html">Reports</a>
        <a href="login.html" onclick="logout()">Logout</a>
    </nav>
</header>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search by name or category or size...">
</div>

<div class="cards">
    <div class="card">
        <h3>Total Items</h3>
        <p id="totalItems">0</p>
    </div>

    <div class="card">
        <h3>Low Stock Items</h3>
        <p id="lowStock">0</p>
    </div>

    <div class="card">
        <h3>Out of Stock Items</h3>
        <p id="outStock">0</p>
    </div>

    <div class="card">
        <h3>Categories</h3>
        <p id="categories">0</p>
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Size</th>
                <th>Quantity</th>
                <th>Stock Status</th>
            </tr>
        </thead>
        <tbody id="dashboardTable">
            <!-- Dynamic data will come here -->
        </tbody>
    </table>
</div>

<footer>
    <aside>&copy; 2026 Wear Stock</aside>
</footer>

<script src="dashboard.js"></script>
</body>
</html>
